version: '3.9'

services:
  # =============================================================================
  # APEX MULTI-MARKET TJR ENGINE — Main Service
  # =============================================================================
  apex-trader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex-trader
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - ENVIRONMENT=paper
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      # Set these via .env file (never hardcode)
      # - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # - TRADOVATE_API_KEY=${TRADOVATE_API_KEY}
      # - BROKER_API_KEY=${BROKER_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - apex-network

  # =============================================================================
  # Optional: Redis for queue/scheduling (uncomment if needed)
  # =============================================================================
  # redis:
  #   image: redis:7-alpine
  #   container_name: apex-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - apex-network

networks:
  apex-network:
    driver: bridge

volumes:
  apex-data:

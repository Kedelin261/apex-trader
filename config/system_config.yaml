# =============================================================================
# APEX MULTI-MARKET TJR ENGINE — SYSTEM CONFIGURATION
# =============================================================================
# This file is the single source of truth for all system-level configuration.
# All hard risk rules are enforced in code. This file configures them.
# =============================================================================

system:
  name: "Apex Multi-Market TJR Engine"
  version: "3.0.0"
  environment: "paper"  # Options: backtest | paper | live
  log_level: "INFO"
  timezone: "UTC"

# =============================================================================
# RISK MANAGEMENT — HARD RULES (non-negotiable)
# =============================================================================
risk:
  max_risk_per_trade_pct: 1.0        # Max % of account per trade
  max_daily_loss_pct: 3.0            # Hard stop: daily loss
  max_total_drawdown_pct: 10.0       # Hard stop: total drawdown
  max_concurrent_trades: 2           # Maximum simultaneous open trades
  min_reward_to_risk_ratio: 2.0      # Minimum R:R required
  max_spread_pips: 3.0               # Reject if spread exceeds this
  max_slippage_pips: 2.0             # Reject or flag if slippage exceeds
  max_position_size_usd: 10000       # Absolute cap per position
  account_balance_default: 100000    # Default paper account balance

# =============================================================================
# TJR STRATEGY ENGINE PARAMETERS
# =============================================================================
strategy:
  tjr:
    enabled: true
    timeframes: ["M5", "M15", "M30"]
    primary_timeframe: "M15"
    higher_tf_confirmation: "M30"
    lower_tf_entry: "M5"

    # Structure detection
    swing_lookback: 20                # Candles to look back for swing H/L
    min_swing_size_pips: 5            # Minimum pip size for valid swing
    bos_confirmation_candles: 1       # Candles needed to confirm BOS

    # Liquidity detection
    equal_level_tolerance_pips: 2.0   # Tolerance for "equal" highs/lows
    sweep_min_pips_beyond: 1.0        # Minimum pips beyond level for sweep

    # Entry confirmation
    confirmation_candle_min_body_pct: 0.5   # Min body/range ratio
    entry_buffer_pips: 1.0            # Buffer above/below entry trigger

    # Stop loss placement
    sl_buffer_pips: 2.0               # Buffer beyond structure for SL
    min_sl_pips: 5.0                  # Minimum stop loss distance

    # Sessions (UTC times)
    sessions:
      london:
        start: "07:00"
        end: "16:00"
        priority: 1
      new_york:
        start: "13:00"
        end: "22:00"
        priority: 1
      overlap:
        start: "13:00"
        end: "16:00"
        priority: 2   # Higher priority = preferred
      asian:
        start: "00:00"
        end: "08:00"
        priority: 3   # Lower priority

    # Compatible markets for TJR
    compatible_markets:
      - FOREX
      - GOLD
      - INDICES
      - FUTURES
      - COMMODITIES

    # Incompatible for TJR (must use alternative strategies)
    requires_alternative_strategy:
      - CRYPTO       # 24/7, different microstructure
      - PREDICTION   # Binary, different logic entirely

# =============================================================================
# MARKET CONFIGURATION
# =============================================================================
markets:
  forex:
    enabled: true
    default_instruments: ["EURUSD", "GBPUSD", "USDJPY", "XAUUSD", "AUDUSD", "USDCAD"]
    session_filter: true
    max_spread_pips: 3.0
    pip_value_usd: 10.0  # per standard lot per pip
    min_volume_filter: true

  gold:
    enabled: true
    instruments: ["XAUUSD"]
    pip_size: 0.01
    contract_size: 100  # oz
    session_filter: true
    high_volatility_filter: true

  futures:
    enabled: true
    instruments: ["ES", "NQ", "CL", "GC", "YM"]
    connector: "tradovate"
    session_filter: true
    rollover_aware: true

  indices:
    enabled: true
    instruments: ["US30", "US500", "NAS100", "GER40", "UK100"]
    session_filter: true

  stocks:
    enabled: false    # Requires broker API key
    instruments: []
    market_hours: "NYSE"

  crypto:
    enabled: false    # Enable when exchange credentials provided
    instruments: ["BTC/USDT", "ETH/USDT"]
    connector: "ccxt"
    exchange: "binance"
    session_filter: false  # 24/7

  commodities:
    enabled: true
    instruments: ["USOIL", "UKOIL", "NATGAS"]
    session_filter: true

  prediction:
    enabled: false    # Requires Kalshi/prediction market API key
    instruments: []
    connector: "kalshi"

# =============================================================================
# BACKTEST CONFIGURATION
# =============================================================================
backtest:
  default_start: "2023-01-01"
  default_end: "2024-12-31"
  initial_balance: 100000
  slippage_pips: 1.0
  commission_per_lot_usd: 7.0
  spread_overhead_pips: 1.0
  latency_ms: 50
  data_dir: "data/historical"
  walk_forward:
    enabled: true
    train_periods: 6    # months
    test_periods: 2     # months
    min_trades_per_period: 10

# =============================================================================
# AGENT CONFIGURATION
# =============================================================================
agents:
  enabled: true
  orchestrator_interval_seconds: 30
  decision_ledger_path: "logs/agent_decision_ledger.jsonl"

  market_sentinel:
    enabled: true
    scan_interval_seconds: 30
    volatility_spike_atr_multiplier: 3.0
    spread_spike_multiplier: 3.0

  instrument_selection:
    enabled: true
    max_active_instruments: 5
    min_liquidity_score: 0.6
    rescan_interval_seconds: 300

  regime_detection:
    enabled: true
    adx_trend_threshold: 25.0
    adx_strong_trend: 40.0
    volatility_high_atr_pct: 2.0

  strategy_validator:
    enabled: true
    min_setup_quality_score: 0.65

  risk_guardian:
    enabled: true
    check_interval_seconds: 10

  execution_supervisor:
    enabled: true
    max_order_retries: 3
    retry_delay_seconds: 2
    circuit_breaker_failures: 5

  optimization:
    enabled: true
    mode: "research_only"   # research_only | controlled | disabled
    walkforward_required: true
    max_param_combinations: 500

  reporting:
    enabled: true
    daily_report_time: "22:00"
    export_formats: ["json", "csv"]

  cost_control:
    enabled: true
    max_daily_ai_calls: 1000
    prefer_local_models: true

# =============================================================================
# BROKER / EXCHANGE CONFIGURATION
# =============================================================================
brokers:
  default: "paper"  # paper | oanda | ibkr | both

  # ── OANDA (EURUSD exclusively) ──────────────────────────────────────────────
  oanda:
    enabled: true
    environment: "practice"   # practice | live
    # Credentials: set APEX_OANDA_API_TOKEN and APEX_OANDA_ACCOUNT_ID in .env
    routes:
      - EURUSD
    # All other forex pairs, gold, futures → IBKR

  # ── IBKR (XAUUSD, Futures, Stocks, Indices, Commodities) ───────────────────
  ibkr:
    enabled: true             # TWS/IB Gateway paper account
    environment: "practice"   # practice | live
    host: "127.0.0.1"         # Set via APEX_IBKR_HOST env var
    port: 7497                # 7497=TWS paper, 7496=TWS live, 4002=Gateway paper, 4001=Gateway live
    client_id: 1              # Set via APEX_IBKR_CLIENT_ID env var
    # Credentials loaded from environment variables:
    #   APEX_IBKR_ACCOUNT_ID   = U25324619
    #   APEX_IBKR_ENVIRONMENT  = practice
    #   APEX_IBKR_HOST         = 127.0.0.1
    #   APEX_IBKR_PORT         = 7497
    futures_expiry: "202506"  # Update quarterly — front month YYYYMM
    routes:
      # Gold / Precious Metals (via Futures at IBKR)
      - XAUUSD
      - GC
      - XAGUSD
      # Equity Futures
      - ES
      - NQ
      - YM
      - CL
      # Stocks
      - AAPL
      - MSFT
      - TSLA
      - NVDA
      - SPY
      - QQQ
      - AMZN
      - GOOGL
      - META
      # Indices
      - US30
      - US500
      - NAS100
      - GER40
      - UK100
      # Commodities
      - USOIL
      - UKOIL
      - NATGAS
      - COPPER
      # Non-EURUSD Forex
      - GBPUSD
      - USDJPY
      - AUDUSD
      - USDCAD
      - USDCHF
      - NZDUSD
      - EURJPY
      - GBPJPY

  tradovate:
    enabled: false
    environment: "demo"   # demo | live
    base_url: "https://demo.tradovate.com/v1"
    websocket_url: "wss://md-demo.tradovateapi.com/v1/websocket"

  forex_broker:
    enabled: false
    name: "placeholder"
    base_url: ""

  ccxt:
    enabled: false
    exchange: "binance"
    testnet: true

  kalshi:
    enabled: false
    environment: "demo"

# =============================================================================
# TRADINGVIEW INTEGRATION
# =============================================================================
tradingview:
  enabled: true
  webhook_path: "/api/signal"
  webhook_secret: "CHANGE_ME_IN_ENV"
  signal_schema_version: "1.0"

# =============================================================================
# MONITORING & ALERTS
# =============================================================================
monitoring:
  telegram:
    enabled: false   # Set to true and provide token in .env
    alert_on_trade: true
    alert_on_risk_event: true
    alert_on_daily_summary: true
    alert_on_error: true

  dashboard:
    enabled: true
    host: "0.0.0.0"
    port: 8080
    refresh_interval_seconds: 5

# =============================================================================
# DATABASE
# =============================================================================
database:
  type: "sqlite"   # sqlite | postgresql
  sqlite_path: "data/apex_trader.db"
  # postgresql_url: "postgresql://user:pass@localhost:5432/apex"

# =============================================================================
# NEWS / ECONOMIC CALENDAR FILTER
# =============================================================================
news_filter:
  enabled: true
  block_minutes_before: 30
  block_minutes_after: 30
  impact_levels: ["HIGH"]   # Block on HIGH impact only, or add "MEDIUM"
  source: "forexfactory"    # forexfactory | investing | manual
  calendar_file: "data/economic_calendar.json"

# =============================================================================
# DATA / STATE PERSISTENCE DIRECTORIES
# =============================================================================
data:
  state_dir: "data"
  logs_dir: "logs"
  historical_dir: "data/historical"

# =============================================================================
# AUTONOMY — All operational values for fully autonomous operation
# =============================================================================
autonomy:

  # --------------------------------------------------------------------------
  # Runtime rollout mode (Phase 11)
  # --------------------------------------------------------------------------
  rollout_mode: "UNATTENDED_PAPER_MODE"
  # Allowed values:
  #   MANUAL_SIGNAL_MODE        — scheduler disabled; signals only from /api/signal
  #   SUPERVISED_AUTONOMY_MODE  — scheduler runs, every order requires operator ack
  #   UNATTENDED_PAPER_MODE     — scheduler runs, orders go to paper broker (default)
  #   UNATTENDED_LIVE_MODE      — scheduler runs, orders go to live broker
  #                               (requires: connected + preflight + armed + alerts + risk_governor + persistence)

  # --------------------------------------------------------------------------
  # Scheduler loop intervals (seconds)
  # --------------------------------------------------------------------------
  scheduler:
    market_data_interval_s: 30
    strategy_scan_interval_s: 30
    position_monitor_interval_s: 10
    reconciliation_interval_s: 60
    health_monitor_interval_s: 30
    signal_process_interval_s: 5

  # --------------------------------------------------------------------------
  # Signal deduplication cache
  # --------------------------------------------------------------------------
  signal_dedup_cache_hours: 24.0   # Keep submitted signal IDs for N hours

  # --------------------------------------------------------------------------
  # Risk Governor (Phase 3 — hard caps for unattended operation)
  # --------------------------------------------------------------------------
  risk_governor:
    max_trades_per_day: 20
    max_positions_per_symbol: 2
    max_positions_per_strategy: 3
    max_exposure_per_asset_class_usd: 50000.0
    max_correlated_exposure_usd: 30000.0
    cooldown_after_consecutive_losses: 3
    cooldown_minutes: 60
    kill_after_broker_rejects: 10
    kill_on_reconciliation_mismatch: true
    kill_on_stale_data_minutes: 5

  # --------------------------------------------------------------------------
  # Portfolio Allocator (Phase 4)
  # --------------------------------------------------------------------------
  portfolio_allocator:
    total_daily_risk_budget_usd: 3000.0    # 3% of 100k default account
    strategies:
      asian_range_breakout:
        enabled: true
        priority: 2
        max_risk_budget_pct: 25.0
        max_concurrent_positions: 2
      orb_vwap:
        enabled: true
        priority: 3
        max_risk_budget_pct: 20.0
        max_concurrent_positions: 2
      vwap_sd_reversion:
        enabled: true
        priority: 4
        max_risk_budget_pct: 15.0
        max_concurrent_positions: 2
      commodity_trend:
        enabled: true
        priority: 5
        max_risk_budget_pct: 15.0
        max_concurrent_positions: 2
      gap_and_go:
        enabled: true
        priority: 3
        max_risk_budget_pct: 20.0
        max_concurrent_positions: 2
      crypto_funding_reversion:
        enabled: false     # disabled until crypto credentials provided
        priority: 7
        max_risk_budget_pct: 10.0
        max_concurrent_positions: 1
      crypto_monday_range:
        enabled: false
        priority: 8
        max_risk_budget_pct: 10.0
        max_concurrent_positions: 1
      prediction_market_arb:
        enabled: false
        priority: 9
        max_risk_budget_pct: 5.0
        max_concurrent_positions: 1

  # --------------------------------------------------------------------------
  # Broker Supervisor (Phase 5 — heartbeat & reconnect policy)
  # --------------------------------------------------------------------------
  broker_supervisor:
    heartbeat_interval_seconds: 30
    max_reconnect_attempts: 5
    backoff_base_seconds: 10
    backoff_max_seconds: 300
    failure_downgrade_threshold: 3     # consecutive failures before ESM block

  # --------------------------------------------------------------------------
  # Position Management Rules (Phase 2)
  # --------------------------------------------------------------------------
  position_management:
    default_max_hold_hours: 48.0
    default_be_trigger_r: 1.0          # Move SL to BE when price is 1R in profit
    default_trailing_enabled: false
    default_trailing_step_pips: 10.0
    default_session_close_exit: true
    default_max_weekend_hold: false
    default_stale_order_minutes: 30.0
    market_close_utc_hour: 21          # Friday 21:00 UTC = pre-weekend exit
    weekend_exit_enabled: true
    per_strategy:
      asian_range_breakout:
        max_hold_hours: 24.0
        be_trigger_r: 1.0
        trailing_enabled: false
        session_close_exit: true
      orb_vwap:
        max_hold_hours: 8.0
        be_trigger_r: 1.0
        trailing_enabled: true
        trailing_step_pips: 15.0
        session_close_exit: true
      vwap_sd_reversion:
        max_hold_hours: 12.0
        be_trigger_r: 1.0
        trailing_enabled: false
        session_close_exit: true
      commodity_trend:
        max_hold_hours: 72.0
        be_trigger_r: 1.5
        trailing_enabled: true
        trailing_step_pips: 20.0
        session_close_exit: false
      gap_and_go:
        max_hold_hours: 6.0
        be_trigger_r: 1.0
        trailing_enabled: false
        session_close_exit: true

  # --------------------------------------------------------------------------
  # Alerting (Phase 7)
  # --------------------------------------------------------------------------
  alerting:
    enabled: true
    min_level: "INFO"      # Only emit alerts at this level or above
    console_always: true   # Console log always active

    # Alert types to enable (subset of all types)
    enabled_types:
      - "BROKER_CONNECTED"
      - "BROKER_DISCONNECTED"
      - "TRADE_OPENED"
      - "TRADE_CLOSED"
      - "STOP_MOVED"
      - "RISK_LIMIT_HIT"
      - "SYSTEM_BLOCKED"
      - "LOOP_FAILURE"
      - "RESTART_DETECTED"
      - "RECONCILIATION_MISMATCH"
      - "REPEATED_REJECTS"
      - "STALE_DATA"
      - "DRAWDOWN_WARNING"
      - "DAILY_SUMMARY"

    # Email adapter (set credentials in .env / .dev.vars, never here)
    email:
      enabled: false       # Set to true after configuring credentials
      smtp_host: ""        # Set APEX_SMTP_HOST in .env
      smtp_port: 587
      smtp_use_tls: true
      from_address: ""     # Set APEX_SMTP_FROM in .env
      to_addresses: []     # Set APEX_ALERT_EMAIL_TO in .env (comma-separated)
      # smtp_user and smtp_password: set APEX_SMTP_USER and APEX_SMTP_PASSWORD in .env

    # Telegram adapter
    telegram:
      enabled: false       # Set to true after providing bot token
      # bot_token: set APEX_TELEGRAM_BOT_TOKEN in .env
      # chat_id:   set APEX_TELEGRAM_CHAT_ID in .env

    # Discord adapter
    discord:
      enabled: false       # Set to true after providing webhook URL
      # webhook_url: set APEX_DISCORD_WEBHOOK_URL in .env

  # --------------------------------------------------------------------------
  # Market hours / shutdown windows
  # --------------------------------------------------------------------------
  market_hours:
    forex_sessions_utc:
      london:  {start: "07:00", end: "16:00"}
      new_york: {start: "13:00", end: "22:00"}
      overlap:  {start: "13:00", end: "16:00"}
      asian:    {start: "00:00", end: "08:00"}
    weekend_halt_utc:
      friday_cutoff: "21:00"       # No new entries after this on Friday
      sunday_resume: "21:00"       # Resume from this time on Sunday

  # --------------------------------------------------------------------------
  # Health thresholds for monitoring endpoints
  # --------------------------------------------------------------------------
  health_thresholds:
    loop_stale_seconds: 120        # Loop is stale if heartbeat > N seconds old
    data_stale_minutes: 5          # Market data stale threshold
    broker_latency_warn_ms: 2000   # Warn if broker round-trip > N ms
